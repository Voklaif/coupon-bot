services:
  coupon-bot:
    build: .
    image: ${APP_IMAGE:-coupon-bot:local}
    container_name: coupon-bot
    user: "${PUID:-1000}:${PGID:-1000}"
    command: ["python", "coupon_bot.py", "--config", "/config/config.json"]
    volumes:
      - ./data:/data
      - ./config:/config:ro
      - ./runtime:/app/runtime
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck_bot.py", "--health-file", "/app/runtime/bot_health.txt", "--max-age-seconds", "${BOT_HEALTH_MAX_AGE_SECONDS:-720}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  coupon-ui:
    build: .
    image: ${APP_IMAGE:-coupon-bot:local}
    container_name: coupon-ui
    user: "${PUID:-1000}:${PGID:-1000}"
    command:
      [
        "sh",
        "-c",
        "python coupon_ui.py --db-path /data/coupons.db --host 0.0.0.0 --port 8080 --username \"$UI_USERNAME\" --password \"$UI_PASSWORD\"",
      ]
    volumes:
      - ./data:/data
      - ./config:/config:ro
      - ./runtime:/app/runtime
    depends_on:
      coupon-bot:
        condition: service_started
    ports:
      - "${UI_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck_ui.py", "--url", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
