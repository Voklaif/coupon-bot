version: "3.9"

services:
  coupon-bot:
    build: .
    container_name: coupon-bot
    command: ["python", "coupon_bot.py", "--config", "/data/config.json"]
    volumes:
      - ./data:/data
    restart: unless-stopped

  coupon-ui:
    build: .
    container_name: coupon-ui
    command: ["python", "coupon_ui.py", "--db-path", "/data/coupons.db", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
